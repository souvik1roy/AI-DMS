services:
  - type: web
    name: ai-dms-sidecar
    runtime: docker
    plan: starter
    region: oregon
    # The orchestrator holds in-memory cancel tokens per process. Running more
    # than one instance would let a cancel request hit the wrong worker, so
    # pin to one instance until a queue is introduced.
    numInstances: 1

    # Build context is the repo root so the multi-stage Dockerfile can COPY
    # both `ui/` (for the Vite build) and `sidecar/` (for the Python service).
    dockerfilePath: ./sidecar/Dockerfile
    dockerContext: .

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      # ---- baked-in defaults --------------------------------------------
      - key: DMS_WEB_MODE
        value: "1"
      - key: PORT
        value: "8080"
      # Path where the multi-stage Docker build drops the React dist; the
      # server.py UI mount reads from here. Override only if you change the
      # Dockerfile copy target.
      - key: DMS_UI_DIST
        value: /app/dist

      # ---- required secrets (set in Render → Environment) ---------------
      # Long random string. Now serves a dual purpose: gates every API call
      # AND is the value FastAPI injects into the served index.html so the
      # UI can authenticate itself on page load. Rotate by editing this
      # variable in Render — the service restarts and the new value flows
      # to the UI on next page load.
      - key: DMS_BEARER_TOKEN
        sync: false
      # OpenAI API key (gpt-4o vision + transcription).
      - key: OPENAI_API_KEY
        sync: false
      # Supabase project URL, e.g. https://<ref>.supabase.co
      - key: SUPABASE_URL
        sync: false
      # Supabase service-role key (NOT the anon key).
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Postgres URI from Supabase. Use the **pooler** (port 6543) URI, not
      # the direct connection — direct hits the connection limit fast.
      - key: DATABASE_URL
        sync: false

      # ---- optional ------------------------------------------------------
      # WEB_ORIGIN is only needed if another origin (not the bundled UI)
      # will call the API. With same-origin UI it can stay unset.
      # - key: WEB_ORIGIN
      #   sync: false

      # ---- optional model / bucket overrides (defaults shown) -----------
      # - key: OPENAI_VISION_MODEL      # default gpt-4o
      # - key: OPENAI_REASONER_MODEL    # default gpt-4o
      # - key: OPENAI_TEXT_MODEL        # default gpt-4o
      # - key: OPENAI_STT_MODEL         # default gpt-4o-transcribe
      # - key: DMS_STAGING_BUCKET       # default 'staging'
      # - key: DMS_ORGANIZED_BUCKET     # default 'organized'
      # - key: DMS_SIGNED_URL_TTL       # default 3600
      # - key: DMS_AUDIO_TRIM_SECONDS   # default 60
      # - key: DMS_LIBREOFFICE_TIMEOUT  # default 120

    # Optional persistent disk for job/sidecar logs. /tmp is ephemeral on
    # Render so /logs/recent and /jobs/{id}/log lose history at every
    # restart without a disk. Uncomment + set DMS_TMP_DIR=/var/dms in
    # envVars to enable.
    # disk:
    #   name: dms-logs
    #   mountPath: /var/dms
    #   sizeGB: 1
