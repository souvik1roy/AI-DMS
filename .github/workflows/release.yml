name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Source-hiding lint
        run: bash scripts/check-source-hiding.sh

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-14
            target: aarch64-apple-darwin
            engine_target: macos-arm64
          - host: macos-13
            target: x86_64-apple-darwin
            engine_target: macos-x64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            engine_target: windows-x64
          - host: ubuntu-20.04
            target: x86_64-unknown-linux-gnu
            engine_target: ubuntu-x64
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Linux UI deps so the AppImage build can find WebKitGTK/GTK at link time.
      # `bundleMediaFramework: true` in tauri.conf.json then embeds them into the
      # AppImage so the user's machine doesn't need apt install.
      - name: Linux UI build deps
        if: matrix.host == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev patchelf

      - name: UI deps
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Sidecar deps + Nuitka build
        shell: bash
        working-directory: sidecar
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          pip install -e .[build]
          bash build_nuitka.sh

      - name: Verify sidecar binary present
        shell: bash
        run: |
          ls src-tauri/binaries/ || true
          # macOS/Linux flat onefile binary, or Windows .dist directory.
          if [ "$RUNNER_OS" = "Windows" ]; then
            test -d "src-tauri/binaries/dms-sidecar-${{ matrix.target }}.dist" \
              || (echo "FATAL: Nuitka standalone dir missing" && exit 1)
          else
            test -f "src-tauri/binaries/dms-sidecar-${{ matrix.target }}" \
              || (echo "FATAL: Nuitka onefile binary missing" && exit 1)
          fi

      - name: Stage VC++ runtime DLLs (Windows only)
        if: matrix.host == 'windows-latest'
        shell: pwsh
        run: |
          # The Windows engine binary links against vcruntime140*, msvcp140 — we
          # bundle those alongside it so the user doesn't need the VC++
          # Redistributable installed. Pull the three DLLs straight from a stock
          # Visual Studio installation that's present on every windows-latest
          # GitHub runner (drop-in alternative: extract from vc_redist.x64.exe).
          New-Item -ItemType Directory -Force -Path vendor/vcredist/win-x64 | Out-Null
          $sources = @(
            "C:\Windows\System32\vcruntime140.dll",
            "C:\Windows\System32\vcruntime140_1.dll",
            "C:\Windows\System32\msvcp140.dll"
          )
          foreach ($src in $sources) {
            if (Test-Path $src) {
              Copy-Item $src vendor/vcredist/win-x64/
            } else {
              throw "Missing $src on the runner — extend this step to pull from vc_redist.x64.exe"
            }
          }
          Get-ChildItem vendor/vcredist/win-x64/

      - name: Cache engine assets
        uses: actions/cache@v4
        with:
          path: engine
          key: engine-${{ matrix.engine_target }}-${{ hashFiles('engine-recipe.json') }}

      - name: Provision engine assets
        shell: bash
        run: python scripts/ci_provision_engine.py --target "${{ matrix.engine_target }}"
        env:
          CI: "true"

      - name: Verify engine assets present
        shell: bash
        run: |
          test -f engine/v.bin && test -f engine/vproj.bin && test -f engine/t.bin
          test -f engine/ai-engine-core || test -f engine/ai-engine-core.exe
          ls -la engine/

      - name: WebView2 fixed runtime (Windows only)
        if: matrix.host == 'windows-latest'
        shell: pwsh
        run: |
          # Fixed-version WebView2 Runtime — bundled into the installer so the
          # end-user machine never needs to download anything from Microsoft.
          # The CAB is mirrored on Microsoft's CDN; for production releases mirror
          # this into your own GitHub Release asset and point WEBVIEW2_MIRROR_URL
          # at the mirror so this build step is fully offline-deterministic.
          $url = $env:WEBVIEW2_MIRROR_URL
          if (-not $url) {
            $url = "https://msedge.sf.dl.delivery.mp.microsoft.com/filestreamingservice/files/abca8c0a-fa83-4554-ae26-fdfb0f01baa1/MicrosoftEdgeWebView2RuntimeInstallerX64.cab"
          }
          New-Item -ItemType Directory -Force -Path src-tauri/WebView2 | Out-Null
          Invoke-WebRequest -Uri $url -OutFile webview2.cab
          expand webview2.cab -F:* src-tauri/WebView2/
          Get-ChildItem -Recurse src-tauri/WebView2 | Select-Object -First 5

      - name: Tauri build
        working-directory: src-tauri
        run: |
          cargo install tauri-cli --version "^2.0.0" --locked
          cargo tauri build --target ${{ matrix.target }}

      - name: Collect installers into software/
        shell: bash
        run: |
          mkdir -p software/${{ matrix.target }}
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle"
          find "$bundle_dir" -type f \( \
            -name "*.dmg" -o \
            -name "*.msi" -o \
            -name "*-setup.exe" -o \
            -name "*.AppImage" \
          \) -exec cp -v {} "software/${{ matrix.target }}/" \;
          ls -la software/${{ matrix.target }}/

      - uses: actions/upload-artifact@v4
        with:
          name: ai-dms-${{ matrix.target }}
          path: software/${{ matrix.target }}/

  collect:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: software/
          pattern: ai-dms-*
          merge-multiple: false
      - name: Flatten layout
        run: |
          # Each matrix artifact arrives as software/ai-dms-<triple>/<files>.
          # Rename to software/<triple>/<files> so the final tree matches the spec.
          set -e
          for d in software/ai-dms-*/; do
            triple="${d#software/ai-dms-}"
            triple="${triple%/}"
            mv "$d" "software/$triple"
          done
          find software -maxdepth 2 -type f | sort
      - uses: actions/upload-artifact@v4
        with:
          name: software
          path: software/
